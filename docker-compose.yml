services:

  # ── App ──────────────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/davic80/ojoalprecio:${IMAGE_TAG:-latest}
    container_name: ojoalprecio-app
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ojoalprecio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ojoalprecio}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - SITE_URL=${SITE_URL:-http://localhost:3000}
      - PORT=3000
      # Scheduler: default every hour. Override with cron expression.
      # Examples: "0 * * * *" = every hour, "*/30 * * * *" = every 30 min
      - CHECK_INTERVAL_CRON=${CHECK_INTERVAL_CRON:-0 * * * *}
      # Parallel scrapers (default 3). Tune for your hardware: Pi 4 (4GB) can handle 3-5.
      - SCRAPER_CONCURRENCY=${SCRAPER_CONCURRENCY:-3}
      # Minimum age in minutes before a product is re-scraped (default 59)
      - MIN_AGE_MS_MINUTES=${MIN_AGE_MS_MINUTES:-59}
      # SMTP email
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      # Admin
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      # Telegram notifications (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_PUBLIC_CHANNEL=${TELEGRAM_PUBLIC_CHANNEL}
      - NODE_ENV=production
    ports:
      - "${HOST_PORT:-8080}:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/auth/login', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ojoalprecio-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ojoalprecio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-ojoalprecio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ojoalprecio} -d ${POSTGRES_DB:-ojoalprecio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ojoalprecio-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
